name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-check:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v6

      - name: Python installieren
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Abhängigkeiten installieren
        run: python -m pip install -r requirements.txt

      - name: Tkinter prüfen
        run: python -c "import tkinter; print(tkinter.TkVersion)"

      - name: Python-Syntax prüfen
        run: python -m compileall -q main tests

      - name: Anwendung importieren
        run: python -c "from main.app import App; from main.main import run"

      - name: Tests ausführen
        shell: pwsh
        run: |
          $tests = Get-ChildItem tests -Recurse -Filter "test_*.py" -ErrorAction SilentlyContinue

          if ($tests) {
            python -m unittest discover -s tests -p "test_*.py" -v
          } else {
            Write-Host "Keine Tests unter tests/ gefunden."
          }
